<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Connected to Spotify</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #191414;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 16px;
    }
    .check { font-size: 3em; }
    h2 { color: #1DB954; margin: 0; }
    p  { color: #b3b3b3; margin: 0; font-size: 0.95em; }
  </style>
</head>
<body>
  <div class="check">✅</div>
  <h2>Connected to Spotify!</h2>
  <p>You can close this window and return to the app.</p>
  <script>
    // If opened as a popup, close automatically after a short delay.
    if (window.opener) {
      setTimeout(function () { window.close(); }, 1500);
    }
  </script>
</body>
</html>
